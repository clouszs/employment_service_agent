<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧就业平台</title>
    <style id="theme-vars">
/* ==========================================
   Smart Career Platform — Brand Design Tokens
   深蓝科技风 · 高校智慧就业服务平台
   ========================================== */

:root {
  /* ---- Primary Palette ---- */
  --color-primary:        #00d4ff;
  --color-primary-light:   #33ddff;
  --color-primary-dark:    #0099cc;
  --color-primary-bg:      rgba(0, 212, 255, 0.08);
  --color-primary-bg-hover:rgba(0, 212, 255, 0.14);

  /* ---- Neutral Scale (dark mode base) ---- */
  --color-bg-body:         #0a0e1a;
  --color-bg-surface:      #111827;
  --color-bg-elevated:      #1a2236;
  --color-bg-overlay:       rgba(0, 0, 0, 0.6);
  --color-bg-card:          #111827;
  --color-bg-card-hover:    #162032;

  --color-text-primary:    #e8ecf4;
  --color-text-secondary:  #8892a4;
  --color-text-tertiary:    #5a6478;
  --color-text-inverse:    #0a0e1a;

  --color-border:          rgba(255, 255, 255, 0.08);
  --color-border-hover:    rgba(255, 255, 255, 0.16);

  /* ---- State Colors ---- */
  --state-success:  #10b981;
  --state-warning: #f59e0b;
  --state-error:   #ef4444;
  --state-info:    #3b82f6;

  /* ---- Gradient Accents ---- */
  --gradient-hero:     linear-gradient(135deg, #00d4ff 0%, #0066ff 50%, #7c3aed 100%);
  --gradient-card:     linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, rgba(0, 102, 255, 0.05) 100%);
  --gradient-glow:     radial-gradient(ellipse at center, rgba(0, 212, 255, 0.15) 0%, transparent 70%);
  --gradient-btn:      linear-gradient(135deg, #00d4ff 0%, #0088cc 100%);
  --gradient-sidebar:  linear-gradient(180deg, #0a0e1a 0%, #111827 100%);

  /* ---- Typography ---- */
  --font-display:    'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  --font-body:        'Inter', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
  --font-mono:        'JetBrains Mono', 'Fira Code', monospace;

  --text-xs:    0.75rem;     /* 12px */
  --text-sm:    0.875rem;    /* 14px */
  --text-base:  1rem;        /* 16px */
  --text-lg:    1.125rem;    /* 18px */
  --text-xl:    1.25rem;     /* 20px */
  --text-2xl:   1.5rem;      /* 24px */
  --text-3xl:   1.875rem;    /* 30px */
  --text-4xl:   2.25rem;     /* 36px */
  --text-5xl:   3rem;        /* 48px */

  --leading-tight:  1.25;
  --leading-normal: 1.5;
  --leading-relaxed:1.625;

  /* ---- Spacing Scale ---- */
  --space-1:  0.25rem;   /* 4px */
  --space-2:  0.5rem;    /* 8px */
  --space-3:  0.75rem;   /* 12px */
  --space-4:  1rem;      /* 16px */
  --space-5:  1.25rem;   /* 20px */
  --space-6:  1.5rem;    /* 24px */
  --space-8:  2rem;      /* 32px */
  --space-10: 2.5rem;    /* 40px */
  --space-12: 3rem;      /* 48px */
  --space-16: 4rem;      /* 64px */
  --space-20: 5rem;      /* 80px */

  /* ---- Border Radius ---- */
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;
  --radius-full: 9999px;

  /* ---- Shadow (static max alpha 0.05) ---- */
  --shadow-sm:   0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md:   0 4px 12px rgba(0, 0, 0, 0.05);
  --shadow-lg:   0 12px 32px rgba(0, 0, 0, 0.05);

  /* ---- Floating layer shadows (allowed deeper) ---- */
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 212, 255, 0.1);
  --shadow-modal: 0 24px 64px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 212, 255, 0.15);

  /* ---- Animation ---- */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

  /* ---- Glow Effect ---- */
  --glow-primary: 0 0 20px rgba(0, 212, 255, 0.2);
  --glow-strong:  0 0 40px rgba(0, 212, 255, 0.3);
}

/* ---- Dark Mode Light Variant (for optional toggle) ---- */
html.light {
  --color-bg-body:         #f0f4f8;
  --color-bg-surface:      #ffffff;
  --color-bg-elevated:      #ffffff;
  --color-bg-overlay:       rgba(0, 0, 0, 0.4);
  --color-bg-card:          #ffffff;
  --color-bg-card-hover:    #f8fafc;
  --color-text-primary:    #0f172a;
  --color-text-secondary:  #64748b;
  --color-text-tertiary:    #94a3b8;
  --color-border:          rgba(0, 0, 0, 0.08);
  --color-border-hover:    rgba(0, 0, 0, 0.16);
  --shadow-sm:   0 1px 2px rgba(0, 0, 0, 0.04);
  --shadow-md:   0 4px 12px rgba(0, 0, 0, 0.06);
  --shadow-lg:   0 12px 32px rgba(0, 0, 0, 0.08);
  --shadow-float: 0 16px 48px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(0, 212, 255, 0.2);
  --shadow-modal: 0 24px 64px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(0, 212, 255, 0.25);
  --gradient-sidebar:  linear-gradient(180deg, #ffffff 0%, #f0f4f8 100%);
}

    </style>

    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-primary: var(--color-primary);
    --color-border: var(--color-border);
  }
  @layer base {
    body { background: var(--color-bg-body); color: var(--color-text-primary); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* ==========================================
         LOGIN PAGE — Enhanced Custom Styles
         ========================================== */

      /* ---- Animated Gradient Background ---- */
      .login-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: linear-gradient(135deg, #0a0e1a 0%, #0d1b3e 25%, #1a0a3e 50%, #0a1628 75%, #0a0e1a 100%);
        background-size: 400% 400%;
        animation: gradientShift 20s ease infinite;
      }

      @keyframes gradientShift {
        0%   { background-position: 0% 50%; }
        25%  { background-position: 100% 0%; }
        50%  { background-position: 100% 100%; }
        75%  { background-position: 0% 100%; }
        100% { background-position: 0% 50%; }
      }

      /* ---- Floating Orbs (z-index: 5) ---- */
      .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.5;
        animation: orbFloat 12s ease-in-out infinite;
      }

      .orb-1 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.4) 0%, transparent 70%);
        top: 10%;
        left: -5%;
        animation-duration: 18s;
      }

      .orb-2 {
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, rgba(0, 102, 255, 0.35) 0%, transparent 70%);
        top: 55%;
        right: -8%;
        animation-duration: 22s;
        animation-delay: -5s;
      }

      .orb-3 {
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.35) 0%, transparent 70%);
        bottom: 5%;
        left: 30%;
        animation-duration: 15s;
        animation-delay: -8s;
      }

      @keyframes orbFloat {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25%  { transform: translate(40px, -30px) scale(1.1); }
        50%  { transform: translate(-20px, 40px) scale(0.95); }
        75%  { transform: translate(30px, 20px) scale(1.05); }
      }

      /* ---- Canvas Layer (z-index: 0/1 combined) ---- */
      .fx-canvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }
      #particleCanvas { z-index: 0; }
      #streamCanvas { z-index: 1; }

      /* ---- Dot Grid Pattern (z-index: 6) ---- */
      .dot-grid {
        position: fixed;
        inset: 0;
        z-index: 6;
        background-image: radial-gradient(circle, rgba(0, 212, 255, 0.15) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      /* ---- 3D Wireframe Geometric Shapes (z-index: 2) ---- */
      .wireframe-container {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        perspective: 1200px;
        overflow: hidden;
      }

      .wireframe-shape {
        position: absolute;
        transform-style: preserve-3d;
      }

      .wireframe-svg {
        position: absolute;
      }

      .wireframe-svg-left {
        left: 3%;
        top: 10%;
        width: 400px;
        height: 400px;
        animation: rotateIco 30s linear infinite;
        transform-origin: center center;
        opacity: 0.2;
      }

      .wireframe-svg-right {
        right: 3%;
        bottom: 10%;
        width: 350px;
        height: 350px;
        animation: rotateOct 25s linear infinite;
        transform-origin: center center;
        opacity: 0.18;
      }

      @keyframes rotateIco {
        0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        100% { transform: rotateX(360deg) rotateY(180deg) rotateZ(90deg); }
      }

      @keyframes rotateOct {
        0%   { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        100% { transform: rotateX(-270deg) rotateY(360deg) rotateZ(-180deg); }
      }

      /* ---- Hexagonal Grid Pattern (z-index: 3) ---- */
      .hex-grid {
        position: fixed;
        inset: 0;
        z-index: 3;
        pointer-events: none;
        opacity: 0.06;
      }

      .hex-grid svg {
        width: 100%;
        height: 100%;
      }

      @keyframes hexPulse {
        0%, 100% { opacity: 0.04; }
        50%      { opacity: 0.12; }
      }

      /* ---- Energy Flow SVG Lines (z-index: 4) — BRIGHTER ---- */
      .energy-flow {
        position: fixed;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }

      .energy-flow path {
        fill: none;
        stroke: rgba(0, 212, 255, 0.35);
        stroke-width: 1.2;
        stroke-dasharray: 8 16;
        filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.5));
        animation: dashFlow 3s linear infinite;
      }

      .energy-flow path:nth-child(2) {
        stroke: rgba(0, 102, 255, 0.3);
        stroke-dasharray: 12 20;
        animation-duration: 4s;
        animation-direction: reverse;
        filter: drop-shadow(0 0 5px rgba(0, 102, 255, 0.4));
      }

      .energy-flow path:nth-child(3) {
        stroke: rgba(124, 58, 237, 0.25);
        stroke-dasharray: 6 14;
        animation-duration: 4.5s;
        filter: drop-shadow(0 0 5px rgba(124, 58, 237, 0.4));
      }

      .energy-flow path:nth-child(4) {
        stroke: rgba(0, 212, 255, 0.2);
        stroke-dasharray: 10 18;
        animation-duration: 2.5s;
        animation-direction: reverse;
        filter: drop-shadow(0 0 4px rgba(0, 212, 255, 0.35));
      }

      .energy-flow path:nth-child(5) {
        stroke: rgba(0, 102, 255, 0.25);
        stroke-dasharray: 8 12;
        animation-duration: 3.5s;
        filter: drop-shadow(0 0 5px rgba(0, 102, 255, 0.4));
      }

      .energy-flow path:nth-child(6) {
        stroke: rgba(124, 58, 237, 0.2);
        stroke-dasharray: 14 22;
        animation-duration: 4s;
        animation-direction: reverse;
        filter: drop-shadow(0 0 4px rgba(124, 58, 237, 0.35));
      }

      @keyframes dashFlow {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -200; }
      }

      /* ---- Scanline Overlay (z-index: 7) ---- */
      .scanlines {
        position: fixed;
        inset: 0;
        z-index: 7;
        pointer-events: none;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 212, 255, 0.015) 2px,
          rgba(0, 212, 255, 0.015) 4px
        );
      }

      /* ---- Glassmorphism Card (z-index: 10) ---- */
      .glass-card {
        position: relative;
        background: rgba(17, 24, 39, 0.6);
        backdrop-filter: blur(24px) saturate(150%);
        -webkit-backdrop-filter: blur(24px) saturate(150%);
        border: 1px solid rgba(0, 212, 255, 0.15);
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(0, 212, 255, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        transition: transform 0.1s ease-out;
        transform-style: preserve-3d;
      }

      /* Light reflection overlay on card */
      .glass-card .card-reflection {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 1;
      }

      @keyframes cardAppear {
        0%   { opacity: 0; transform: translateY(30px) scale(0.96); filter: blur(8px); }
        100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      /* ---- AI Logo Icon ---- */
      .ai-icon {
        width: 64px;
        height: 64px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.15) 0%, rgba(124, 58, 237, 0.15) 100%);
        border-radius: var(--radius-lg);
        border: 1px solid rgba(0, 212, 255, 0.25);
        box-shadow:
          0 0 30px rgba(0, 212, 255, 0.15),
          inset 0 0 20px rgba(0, 212, 255, 0.05);
        animation: iconPulse 3s ease-in-out infinite;
      }

      .ai-icon::before {
        content: '';
        position: absolute;
        inset: -2px;
        border-radius: var(--radius-lg);
        background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), transparent, rgba(124, 58, 237, 0.4));
        z-index: -1;
        mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        mask-composite: exclude;
        -webkit-mask-composite: xor;
        padding: 2px;
        opacity: 0.6;
        animation: borderGlow 3s ease-in-out infinite alternate;
      }

      @keyframes iconPulse {
        0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.15), inset 0 0 20px rgba(0, 212, 255, 0.05); }
        50%      { box-shadow: 0 0 40px rgba(0, 212, 255, 0.25), inset 0 0 30px rgba(0, 212, 255, 0.1); }
      }

      @keyframes borderGlow {
        0%   { opacity: 0.4; }
        100% { opacity: 0.8; }
      }

      .ai-icon svg {
        width: 36px;
        height: 36px;
        color: var(--color-primary);
        filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.4));
      }

      /* ---- Input Fields ---- */
      .login-input {
        width: 100%;
        background: rgba(10, 14, 26, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--radius-md);
        padding: 14px 16px 14px 48px;
        font-size: var(--text-base);
        font-family: var(--font-body);
        color: var(--color-text-primary);
        transition: all var(--transition-base);
        outline: none;
      }

      .login-input::placeholder {
        color: var(--color-text-tertiary);
      }

      .login-input:hover {
        border-color: rgba(255, 255, 255, 0.16);
        background: rgba(10, 14, 26, 0.8);
      }

      .login-input:focus {
        border-color: var(--color-primary);
        box-shadow:
          0 0 0 3px rgba(0, 212, 255, 0.1),
          0 0 20px rgba(0, 212, 255, 0.08);
        background: rgba(10, 14, 26, 0.9);
      }

      /* ---- Password Toggle ---- */
      .pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: var(--color-text-tertiary);
        cursor: pointer;
        padding: 4px;
        transition: color var(--transition-fast);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .pw-toggle:hover {
        color: var(--color-primary);
      }

      .pw-toggle svg {
        width: 20px;
        height: 20px;
      }

      /* ---- Login Button ---- */
      .btn-login {
        width: 100%;
        padding: 14px 24px;
        font-size: var(--text-lg);
        font-family: var(--font-body);
        font-weight: 600;
        letter-spacing: 0.15em;
        color: var(--color-text-inverse);
        background: linear-gradient(135deg, #00d4ff 0%, #0066ff 50%, #7c3aed 100%);
        background-size: 200% 200%;
        border: none;
        border-radius: var(--radius-md);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all var(--transition-base);
        animation: gradientBtnShift 4s ease infinite;
      }

      .btn-login::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0) 100%);
        transform: translateX(-100%);
        transition: transform 0.6s ease;
      }

      .btn-login:hover {
        box-shadow:
          0 0 30px rgba(0, 212, 255, 0.35),
          0 0 60px rgba(0, 102, 255, 0.2);
        transform: translateY(-1px);
      }

      .btn-login:hover::before {
        transform: translateX(100%);
      }

      .btn-login:active {
        transform: translateY(0);
        box-shadow:
          0 0 20px rgba(0, 212, 255, 0.25),
          0 0 40px rgba(0, 102, 255, 0.15);
      }

      @keyframes gradientBtnShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* ---- Checkbox ---- */
      .custom-checkbox {
        appearance: none;
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        border: 1.5px solid rgba(255, 255, 255, 0.15);
        border-radius: var(--radius-sm);
        background: rgba(10, 14, 26, 0.6);
        cursor: pointer;
        transition: all var(--transition-fast);
        position: relative;
        flex-shrink: 0;
      }

      .custom-checkbox:checked {
        background: var(--color-primary);
        border-color: var(--color-primary);
        box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
      }

      .custom-checkbox:checked::after {
        content: '';
        position: absolute;
        left: 5px;
        top: 2px;
        width: 5px;
        height: 9px;
        border: solid var(--color-text-inverse);
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .custom-checkbox:hover {
        border-color: rgba(0, 212, 255, 0.4);
      }

      /* ---- Input Icon ---- */
      .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--color-text-tertiary);
        pointer-events: none;
        display: flex;
        align-items: center;
        transition: color var(--transition-fast);
      }

      .input-icon svg {
        width: 20px;
        height: 20px;
      }

      .input-group:focus-within .input-icon {
        color: var(--color-primary);
        filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.3));
      }

      /* ---- Responsive ---- */
      @media (max-width: 640px) {
        .glass-card {
          margin: 16px;
          padding: 32px 24px !important;
        }
        .ai-icon {
          width: 52px;
          height: 52px;
        }
        .ai-icon svg {
          width: 28px;
          height: 28px;
        }
        .orb-1 { width: 200px; height: 200px; }
        .orb-2 { width: 180px; height: 180px; }
        .orb-3 { width: 140px; height: 140px; }
        .wireframe-svg-left,
        .wireframe-svg-right {
          opacity: 0.1;
          width: 200px !important;
          height: 200px !important;
        }
      }

      @media (min-width: 641px) and (max-width: 1024px) {
        .glass-card {
          max-width: 480px;
          padding: 48px 40px !important;
        }
      }
    </style>
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">

    <!-- Layer 0: Canvas Particle Network + Data Streams + Radiating Lines -->
    <canvas id="particleCanvas" class="fx-canvas" aria-hidden="true"></canvas>
    <canvas id="streamCanvas" class="fx-canvas" aria-hidden="true"></canvas>

    <!-- Layer 2: 3D Rotating Wireframes -->
    <div class="wireframe-container" aria-hidden="true">
        <svg class="wireframe-svg wireframe-svg-left" viewBox="-200 -200 400 400" fill="none">
            <g stroke="rgba(0,212,255,0.6)" stroke-width="0.8">
                <polygon points="0,-190 180,-59 112,154 -112,154 -180,-59" fill="none"/>
                <polygon points="0,190 180,59 112,-154 -112,-154 -180,59" fill="none"/>
                <line x1="0" y1="-190" x2="0" y2="190"/>
                <line x1="180" y1="-59" x2="180" y2="59"/>
                <line x1="112" y1="154" x2="112" y2="-154"/>
                <line x1="-112" y1="154" x2="-112" y2="-154"/>
                <line x1="-180" y1="-59" x2="-180" y2="59"/>
                <line x1="0" y1="-190" x2="180" y2="59"/>
                <line x1="0" y1="-190" x2="112" y2="-154"/>
                <line x1="0" y1="-190" x2="-112" y2="-154"/>
                <line x1="0" y1="-190" x2="-180" y2="59"/>
                <line x1="180" y1="-59" x2="0" y2="190"/>

    <script>
    /* ==========================================

    // ---- Password Toggle ----
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const eyeOff = document.getElementById('eyeOff');
        const eyeOn = document.getElementById('eyeOn');
        if (input.type === 'password') {
            input.type = 'text';

    /* ==========================================
       Effect 1: Canvas Particle Network (ENHANCED)
       — 200 particles, higher visibility, glow 50%
       — Radiating lines from center (starburst)
       — Concentric pulsing rings (radar/sonar)
       — Shooting star streaks
       ========================================== */
    (function() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mouseX = -1000, mouseY = -1000;

        /* ---- Particle Config ---- */
        const PARTICLE_COUNT = 200;
        const CONNECTION_DIST = 180;
        const MOUSE_RADIUS = 200;
        const particles = [];

        const COLORS = [
            { r: 0, g: 212, b: 255 },   // #00d4ff
            { r: 0, g: 102, b: 255 },   // #0066ff
            { r: 124, g: 58, b: 237 }   // #7c3aed
        ];

        /* ---- Radiating Lines Config (Starburst) ---- */
        const RAY_COUNT = 240;
        const RAY_MIN_LEN = 0.4;   // fraction of max radius
        const RAY_MAX_LEN = 1.0;
        const RAY_ROTATION_PERIOD = 75; // seconds per full rotation
        let rayAngles = [];
        let rayLengths = [];
        let rayAlphas = [];

        /* ---- Offscreen canvas for radiating lines ---- */
        let offCanvas, offCtx;
        let offCanvasSize = 0;

        function buildRayOffscreen() {
            /* Use the larger dimension so rotation never clips */
            var dim = Math.max(W, H);
            if (dim === offCanvasSize) return;
            offCanvasSize = dim;
            offCanvas = document.createElement('canvas');
            offCanvas.width = dim;
            offCanvas.height = dim;
            offCtx = offCanvas.getContext('2d');
            drawRaysOffscreen();
        }

        function initRays() {
            rayAngles = [];
            rayLengths = [];
            rayAlphas = [];
            for (var i = 0; i < RAY_COUNT; i++) {
                rayAngles.push(Math.random() * Math.PI * 2);
                rayLengths.push(RAY_MIN_LEN + Math.random() * (RAY_MAX_LEN - RAY_MIN_LEN));
                rayAlphas.push(0.12 + Math.random() * 0.28);
            }
        }

        function drawRaysOffscreen() {
            var dim = offCanvas.width;
            var cx = dim / 2;
            var cy = dim / 2;
            var maxR = Math.sqrt(cx * cx + cy * cy);

            offCtx.clearRect(0, 0, dim, dim);

            for (var i = 0; i < RAY_COUNT; i++) {
                var angle = rayAngles[i];
                var len = rayLengths[i] * maxR;
                var alpha = rayAlphas[i];
                var lw = 0.5 + Math.random() * 1.0;

                offCtx.beginPath();
                offCtx.moveTo(cx, cy);
                offCtx.lineTo(cx + Math.cos(angle) * len, cy + Math.sin(angle) * len);
                offCtx.strokeStyle = 'rgba(0,212,255,' + alpha + ')';
                offCtx.lineWidth = lw;
                offCtx.stroke();
            }

            /* Add a bright center glow */
            var cg = offCtx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.15);
            cg.addColorStop(0, 'rgba(0,212,255,0.12)');
            cg.addColorStop(0.5, 'rgba(0,212,255,0.04)');
            cg.addColorStop(1, 'rgba(0,212,255,0)');
            offCtx.fillStyle = cg;
            offCtx.fillRect(0, 0, dim, dim);
        }

        /* ---- Pulsing Concentric Rings ---- */
        var RING_COUNT = 4;
        var rings = [];
        function initRings() {
            rings = [];
            for (var i = 0; i < RING_COUNT; i++) {
                rings.push({
                    radius: 0,
                    maxRadius: 250 + i * 80,
                    alpha: 0.5,
                    speed: 0.4 + i * 0.15,
                    phase: (i / RING_COUNT) * (Math.PI * 2)
                });
            }
        }

        /* ---- Shooting Stars ---- */
        var STREAK_COUNT = 10;
        var streaks = [];

        function createStreak() {
            var edge = Math.random();
            var sx, sy, ex, ey;
            /* Start from a random edge */
            if (edge < 0.25) { sx = 0; sy = Math.random() * H; }
            else if (edge < 0.5) { sx = W; sy = Math.random() * H; }
            else if (edge < 0.75) { sx = Math.random() * W; sy = 0; }
            else { sx = Math.random() * W; sy = H; }
            /* Aim roughly toward center with spread */
            var targetX = W * (0.3 + Math.random() * 0.4);
            var targetY = H * (0.3 + Math.random() * 0.4);
            var angle = Math.atan2(targetY - sy, targetX - sx) + (Math.random() - 0.5) * 1.2;
            var speed = 6 + Math.random() * 10;
            var len = 80 + Math.random() * 160;
            return {
                x: sx, y: sy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                trailLen: len,
                life: 1.0,
                decay: 0.006 + Math.random() * 0.008,
                active: true,
                width: 1 + Math.random() * 1.5,
                color: Math.random() < 0.6 ? { r: 0, g: 212, b: 255 } : (Math.random() < 0.7 ? { r: 0, g: 102, b: 255 } : { r: 124, g: 58, b: 237 })
            };
        }

        function initStreaks() {
            streaks = [];
            for (var i = 0; i < STREAK_COUNT; i++) {
                var s = createStreak();
                s.life = 0; /* start inactive */
                s.active = false;
                streaks.push(s);
            }
        }

        /* Resize */
        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            offCanvasSize = 0; // force rebuild
            buildRayOffscreen();
        }

        /* ---- Particles ---- */
        function createParticle() {
            var color = COLORS[Math.random() < 0.6 ? 0 : (Math.random() < 0.7 ? 1 : 2)];
            return {
                x: Math.random() * W,
                y: Math.random() * H,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                size: Math.random() * 2.5 + 0.8,
                color: color,
                glow: Math.random() < 0.5,
                baseAlpha: 0.6 + Math.random() * 0.4
            };
        }

        function init() {
            resize();
            particles.length = 0;
            for (var i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(createParticle());
            }
            initRays();
            initRings();
            initStreaks();
        }

        /* ---- Main Draw Loop ---- */
        var startTime = performance.now();

        function drawFrame(now) {
            ctx.clearRect(0, 0, W, H);
            var elapsed = (now - startTime) / 1000; // seconds

            /* --- Draw radiating lines (rotated from offscreen) --- */
            buildRayOffscreen();
            if (offCanvas) {
                var rotAngle = (elapsed / RAY_ROTATION_PERIOD) * Math.PI * 2;
                var cx = W / 2;
                var cy = H / 2;
                var dim = offCanvas.width;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(rotAngle);
                ctx.drawImage(offCanvas, -dim / 2, -dim / 2);
                ctx.restore();
            }

            /* --- Draw concentric pulsing rings --- */
            var cardRect = document.getElementById('loginCard');
            var rcx = cx = W / 2;
            var rcy = cy = H / 2;
            if (cardRect) {
                var r = cardRect.getBoundingClientRect();
                rcx = r.left + r.width / 2;
                rcy = r.top + r.height / 2;
            }

            for (var ri = 0; ri < rings.length; ri++) {
                var ring = rings[ri];
                ring.radius += ring.speed;
                if (ring.radius > ring.maxRadius) {
                    ring.radius = 0;
                }
                var progress = ring.radius / ring.maxRadius;
                var ringAlpha = (1 - progress) * 0.35 * (0.7 + 0.3 * Math.sin(elapsed * 2 + ring.phase));
                if (ringAlpha > 0.01) {
                    ctx.beginPath();
                    ctx.arc(rcx, rcy, ring.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(0,212,255,' + ringAlpha.toFixed(3) + ')';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }

            /* --- Draw shooting stars --- */
            for (var si = 0; si < streaks.length; si++) {
                var s = streaks[si];
                if (!s.active) continue;

                s.x += s.vx;
                s.y += s.vy;
                s.life -= s.decay;

                if (s.life <= 0 || s.x < -200 || s.x > W + 200 || s.y < -200 || s.y > H + 200) {
                    s.active = false;
                    continue;
                }

                var tailX = s.x - (s.vx / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.trailLen * s.life;
                var tailY = s.y - (s.vy / Math.sqrt(s.vx * s.vx + s.vy * s.vy)) * s.trailLen * s.life;

                var grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
                grad.addColorStop(0, 'rgba(' + s.color.r + ',' + s.color.g + ',' + s.color.b + ',' + (s.life * 0.9).toFixed(3) + ')');
                grad.addColorStop(1, 'rgba(' + s.color.r + ',' + s.color.g + ',' + s.color.b + ',0)');

                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(tailX, tailY);
                ctx.strokeStyle = grad;
                ctx.lineWidth = s.width;
                ctx.stroke();

                /* Bright head dot */
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.width * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + s.color.r + ',' + s.color.g + ',' + s.color.b + ',' + (s.life * 0.8).toFixed(3) + ')';
                ctx.fill();
            }

            /* --- Spawn new streaks randomly --- */
            var activeStreaks = 0;
            for (var si2 = 0; si2 < streaks.length; si2++) { if (streaks[si2].active) activeStreaks++; }
            if (activeStreaks < 3 && Math.random() < 0.008) {
                for (var si3 = 0; si3 < streaks.length; si3++) {
                    if (!streaks[si3].active) {
                        streaks[si3] = createStreak();
                        break;
                    }
                }
            }

            /* --- Draw particle connections --- */
            for (var i = 0; i < particles.length; i++) {
                for (var j = i + 1; j < particles.length; j++) {
                    var dx = particles[i].x - particles[j].x;
                    var dy = particles[i].y - particles[j].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < CONNECTION_DIST) {
                        var alpha = (1 - dist / CONNECTION_DIST) * 0.55;
                        var ci = particles[i].color;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(' + ci.r + ',' + ci.g + ',' + ci.b + ',' + alpha.toFixed(3) + ')';
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }
                }
            }

            /* --- Draw particles --- */
            for (var pi = 0; pi < particles.length; pi++) {
                var p = particles[pi];
                var c = p.color;

                /* Mouse repulsion */
                var mdx = p.x - mouseX;
                var mdy = p.y - mouseY;
                var mDist = Math.sqrt(mdx * mdx + mdy * mdy);
                if (mDist < MOUSE_RADIUS && mDist > 0) {
                    var force = (MOUSE_RADIUS - mDist) / MOUSE_RADIUS * 0.8;
                    p.vx += (mdx / mDist) * force;
                    p.vy += (mdy / mDist) * force;
                }

                /* Brownian motion */
                p.vx += (Math.random() - 0.5) * 0.03;
                p.vy += (Math.random() - 0.5) * 0.03;

                /* Damping */
                p.vx *= 0.99;
                p.vy *= 0.99;

                p.x += p.vx;
                p.y += p.vy;

                /* Wrap around */
                if (p.x < -20) p.x = W + 20;
                if (p.x > W + 20) p.x = -20;
                if (p.y < -20) p.y = H + 20;
                if (p.y > H + 20) p.y = -20;

                /* Glow (much bigger and brighter) */
                if (p.glow) {
                    var glowR = p.size * 8;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, glowR, 0, Math.PI * 2);
                    var grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR);
                    grad.addColorStop(0, 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.25)');
                    grad.addColorStop(1, 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0)');
                    ctx.fillStyle = grad;
                    ctx.fill();
                }

                /* Core dot */
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + p.baseAlpha.toFixed(3) + ')';
                ctx.fill();
            }

            requestAnimationFrame(drawFrame);
        }

        /* Mouse parallax for particles */
        document.addEventListener('mousemove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', function() {
            resize();
        });

        init();
        requestAnimationFrame(drawFrame);
    })();

    /* ==========================================
       Effect 2: Data Stream / Matrix Rain Lines (BRIGHTER)
       ========================================== */
    (function() {
        const canvas = document.getElementById('streamCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;

        const CHARS = '01\u2211\u222B\u0394\u03C0\u03BB{}[]<>/?\u5C31\u4E1A\u667A\u6167';
        const STREAM_COUNT = 35;
        const streams = [];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function createStream() {
            const len = 50 + Math.random() * 250;
            const chars = [];
            for (let i = 0; i < len; i++) {
                chars.push(CHARS[Math.floor(Math.random() * CHARS.length)]);
            }
            return {
                x: Math.random() * W,
                y: Math.random() * -H,
                speed: 0.3 + Math.random() * 1.2,
                length: len,
                chars: chars,
                opacity: 0.08 + Math.random() * 0.12,
                fontSize: 12 + Math.random() * 4
            };
        }

        function init() {
            resize();
            streams.length = 0;
            for (let i = 0; i < STREAM_COUNT; i++) {
                const s = createStream();
                s.y = Math.random() * H;
                streams.push(s);
            }
        }

        function drawStreams() {
            ctx.clearRect(0, 0, W, H);
            ctx.font = '13px monospace';

            for (let i = 0; i < streams.length; i++) {
                const s = streams[i];
                ctx.font = s.fontSize + 'px monospace';

                for (let j = 0; j < s.length; j++) {
                    const charAlpha = s.opacity * (1 - j / s.length);
                    if (charAlpha < 0.005) continue;
                    ctx.fillStyle = 'rgba(0,212,255,' + charAlpha.toFixed(4) + ')';
                    ctx.fillText(s.chars[j], s.x, s.y + j * s.fontSize);

                    /* Bright head character */
                    if (j === 0) {
                        ctx.fillStyle = 'rgba(0,212,255,' + Math.min(charAlpha * 3, 0.6).toFixed(4) + ')';
                        ctx.fillText(s.chars[j], s.x, s.y);
                    }

                    if (Math.random() < 0.01) {
                        s.chars[j] = CHARS[Math.floor(Math.random() * CHARS.length)];
                    }
                }

                s.y += s.speed;
                if (s.y > H + 100) {
                    s.y = -s.length * s.fontSize - Math.random() * 200;
                    s.x = Math.random() * W;
                }
            }
        }

        window.addEventListener('resize', resize);
        init();

        function loop() {
            drawStreams();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);
    })();

    /* ==========================================
       Effect 6: 3D Perspective Tilt on Card
       ========================================== */
    (function() {
        const card = document.getElementById('loginCard');
        const reflection = document.getElementById('cardReflection');
        const MAX_TILT = 4;

        if (!card || !reflection) return;

        card.addEventListener('mousemove', function(e) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;

            const rotateY = ((x - centerX) / centerX) * MAX_TILT;
            const rotateX = -((y - centerY) / centerY) * MAX_TILT;

            card.style.transform = 'perspective(800px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg)';

            const percentX = (x / rect.width) * 100;
            const percentY = (y / rect.height) * 100;
            reflection.style.opacity = '1';
            reflection.style.background = 'radial-gradient(circle at ' + percentX + '% ' + percentY + '%, rgba(0,212,255,0.08) 0%, transparent 60%)';
        });

        card.addEventListener('mouseleave', function() {
            card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg)';
            reflection.style.opacity = '0';
        });
    })();

    </script>
