version: "3.9"

services:
  # ===== MySQL 8.4 =====
  db:
    image: mysql:8.4
    container_name: rag_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-claudecode_rag}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_0900_ai_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_net

  # ===== Redis（Embedding 缓存）=====
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag_net

  # ===== FastAPI 后端 =====
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # 数据库
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-claudecode_rag}
      # LLM
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-qwen-plus}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # Redis
      REDIS_ENABLED: true
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Agent
      AGENT_ENABLED: ${AGENT_ENABLED:-true}
      # 环境
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "false"
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/chroma_data:/app/chroma_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rag_net

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

networks:
  rag_net:
    driver: bridge
